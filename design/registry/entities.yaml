# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: apply_xp
    status: active
    source: design/gdd/dragon-progression.md
    referenced_by:
      - design/gdd/dragon-progression.md
      - design/gdd/hatchery.md
      - design/gdd/shop.md
    variables:
      - dragon
      - xp_amount
      - battle_charges
    output_range: [1, 60]       # dragon.level after application; clamped to MAX_LEVEL
    expression: "Iterative: while xp >= xp_threshold_for(dragon.level): advance level, emit signals; applies Resonance battle-charge threshold reduction"
    notes: "Canonical XP routine. Hatchery delegates all duplicate-dragon XP grants here. Returns {levels_gained, new_level, battle_charges_used}. stats_updated only emitted when levels_gained > 0."
    added: "2026-05-22"
    revised: "2026-05-26"

  - name: xp_battle_scaling
    status: active
    source: design/gdd/battle-engine.md
    referenced_by:
      - design/gdd/battle-engine.md
      - design/gdd/dragon-progression.md
      - design/gdd/campaign-map.md
    variables:
      - base_xp
      - enemyLevel
      - playerLevel
    output_range: [1, null]     # min 1 enforced by max()
    expression: "max(1, floor(base_xp × float(enemyLevel) / float(playerLevel)))"
    notes: "Battle engine is canonical owner. Dragon Progression references this formula. Campaign Map extends this with over-leveling decay (see xp_battle_scaling_decayed). ADR pending to formalise ownership (XP formula ADR — Step 2c)."
    added: "2026-05-22"
    revised: "2026-05-24"

  - name: xp_battle_scaling_decayed
    status: active
    source: design/gdd/campaign-map.md
    referenced_by:
      - design/gdd/campaign-map.md
    variables:
      - base_xp
      - enemyLevel
      - playerLevel
      - XP_DECAY_BAND
      - XP_DECAY_MULT
    output_range: [1, null]     # min 1 enforced by outer max()
    expression: |
      xp_raw = max(1, floor(base_xp × float(enemyLevel) / float(playerLevel)))
      decay_mult = XP_DECAY_MULT if playerLevel > (enemyLevel + XP_DECAY_BAND) else 1.0
      xp_earned = max(1, floor(xp_raw × decay_mult))
    notes: "Campaign Map extension of xp_battle_scaling. Adds over-leveling decay to discourage backtracking. XP_DECAY_BAND=5, XP_DECAY_MULT=0.25 are defaults (tunable). Base formula (without decay) is xp_battle_scaling."
    added: "2026-05-24"
    revised: ""

  - name: damage_calculation
    status: active
    source: design/gdd/battle-engine.md
    referenced_by:
      - design/gdd/battle-engine.md
      - design/gdd/dragon-progression.md
    variables:
      - atk
      - def
      - stage_mult             # lookup from stage_stat_multiplier formula
      - typeEff
      - defend_mult            # 0.5 when defending, else 1.0
      - variance               # random float in [0.85, 1.0]
    output_range: [1, null]    # min 1 enforced
    expression: "preCritDamage = max(1, floor((((atk × stage_mult × 1.5) − (def × 0.5)) × typeEff × defend_mult) × variance)); crit may then multiply by 1.5"
    notes: "Battle Engine is canonical. stage_mult must match stage_stat_multiplier, with an Elder Stage IV branch when is_elder=true."
    added: "2026-05-22"
    revised: "2026-05-26"

  - name: fusion_stat_inherit
    status: active
    source: design/gdd/fusion-engine.md
    referenced_by:
      - design/gdd/fusion-engine.md
      - design/gdd/dragon-progression.md
    variables:
      - parent_a_stat
      - parent_b_stat
      - parent_a_level
      - parent_b_level
      - element_modifier        # 1.25 same-element, 0.85 cross-element HP only, 1.0 otherwise
    output_range: [1, null]
    expression: "floor((parent_a_stat + parent_b_stat) / 2 × (1 + level_bonus) × element_modifier), min 1"
    notes: "level_bonus capped at LEVEL_BONUS_MULT × (avg_parent_level / MAX_LEVEL). Output child stats feed into dragon-progression stat structure. ELDER_STAGE_MULT is a combat stage multiplier, not an inherited stat multiplier. MAX_LEVEL cap (60) must remain in sync."
    added: "2026-05-22"
    revised: "2026-05-26"

  - name: cache_shard_xp_grant
    status: active
    source: design/gdd/shop.md
    referenced_by:
      - design/gdd/shop.md
      - design/gdd/dragon-progression.md
    variables:
      - dragon.level
      - dragon.xp
      - dragon.stage
      - CACHE_SHARD_BASE_XP
    output_range: [0, 100]
    expression: |
      if dragon.level == MAX_LEVEL: return (no call)
      xp_to_boundary = stage-dependent algebraic formula (see shop.md Formula 1)
      cap = max(0, xp_to_boundary - 1)
      actual_xp = min(CACHE_SHARD_BASE_XP, cap)
      if actual_xp > 0: apply_xp(party[0], actual_xp)
    notes: "Stage-boundary-safe XP grant. Never causes a stage transition in a single apply_xp call. apply_xp is skipped entirely when actual_xp=0 to avoid zero-grant signals."
    added: "2026-05-25"
    revised: ""

  - name: emergency_patch_hp_restore
    status: active
    source: design/gdd/shop.md
    referenced_by:
      - design/gdd/shop.md
      - design/gdd/battle-engine.md
    variables:
      - dragon.max_hp
      - dragon.current_hp
      - EMERGENCY_PATCH_FACTOR
    output_range: [1, max_hp]
    expression: |
      target_hp = max(1, floor(dragon.max_hp × EMERGENCY_PATCH_FACTOR))
      if dragon.current_hp < target_hp: dragon.current_hp = target_hp
    notes: "Only restores (never reduces). Can revive 0 HP dragons. Item consumed regardless of HP change. Battle Engine GDD owns greying logic when current_hp >= target_hp."
    added: "2026-05-25"
    revised: ""

  - name: stage_stat_multiplier
    status: active
    source: design/gdd/dragon-progression.md
    referenced_by:
      - design/gdd/dragon-progression.md
      - design/gdd/battle-engine.md
    variables:
      - dragon_stage            # int 1-4
    output_range: [0.5, 1.4]
    expression: "lookup: I→0.5, II→0.75, III→1.0, IV→1.4"
    notes: "Applied in battle-engine damage and defence calculations. Dragon Progression is authoritative; battle-engine must match exactly."
    added: "2026-05-22"
    revised: ""


