name: Automated Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  vitest:
    name: Browser unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint   # catches undefined-identifier render crashes the build/tests miss
      - run: npm test
