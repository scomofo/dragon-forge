# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: durable_save_schema
    status: active
    api: "Godot Resource SaveData"
    not: "untyped JSON/dictionary as MVP durable state authority"
    adr: docs/architecture/adr-0001-save-transaction-boundary.md
    reason: "Typed Resources make ownership, migration, and atomic staging easier to validate."
    referenced_by:
      - docs/architecture/adr-0001-save-transaction-boundary.md
      - docs/architecture/adr-0004-authored-content-resources.md
    added: 2026-05-26
    revised: ""

  - purpose: input_action_keys
    status: active
    api: "Godot InputMap actions as StringName values"
    not: "raw hardware constants in feature systems"
    adr: docs/architecture/adr-0003-input-router-semantic-actions.md
    reason: "Semantic actions keep gamepad, keyboard, and mouse/touch fallback behavior consistent."
    referenced_by:
      - docs/architecture/adr-0003-input-router-semantic-actions.md
    added: 2026-05-26
    revised: ""

  - purpose: authored_cross_system_content
    status: active
    api: "typed Godot Resources with stable IDs"
    not: "scattered script constants for cross-system content IDs"
    adr: docs/architecture/adr-0004-authored-content-resources.md
    reason: "Stable authored data supports save migration, designer review, and runtime validation."
    referenced_by:
      - docs/architecture/adr-0004-authored-content-resources.md
    added: 2026-05-26
    revised: ""

  - purpose: scene_flow_and_services
    status: active
    api: "BootstrapRoot plus limited foundation services: ContentRegistry, SaveService, InputRouter, SceneFlowService"
    not: "feature scenes directly instantiating unrelated root scenes or broad gameplay Autoload access"
    adr: docs/architecture/adr-0005-godot-scene-flow-and-autoload-boundaries.md
    reason: "A single transition and boot pattern keeps focus restoration, content validation, and save/event ordering testable."
    referenced_by:
