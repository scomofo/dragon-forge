# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: direct_feature_save_writes
    status: active
    description: "Feature systems must not write durable save files directly."
    why: "Direct writes can create partial economy, corruption, Journal, or ending states."
    adr: docs/architecture/adr-0001-save-transaction-boundary.md
    added: 2026-05-26

  - pattern: emit_before_commit
    status: active
    description: "Durable-state signals must not be emitted before the backing save commit succeeds."
    why: "Downstream systems could react to state that later rolls back."
    adr: docs/architecture/adr-0001-save-transaction-boundary.md
    added: 2026-05-26

  - pattern: raw_input_in_feature_systems
    status: active
    description: "Feature systems must not branch on raw gamepad button constants for player-facing flows."
    why: "Raw hardware branching creates inconsistent controls and undermines gamepad-first QA."
    adr: docs/architecture/adr-0003-input-router-semantic-actions.md
    added: 2026-05-26

  - pattern: hover_only_interaction
    status: active
    description: "Required player-facing interactions must not depend on mouse hover."
    why: "The project is gamepad-first and Godot 4.6 separates mouse/touch focus from keyboard/gamepad focus."
    adr: docs/architecture/adr-0003-input-router-semantic-actions.md
    added: 2026-05-26

  - pattern: feature_scene_direct_root_instantiation
    status: active
    description: "Feature systems must not instantiate unrelated top-level screens directly."
    why: "SceneFlow owns transition safety, focus restoration, and failure handling."
    adr: docs/architecture/adr-0005-godot-scene-flow-and-autoload-boundaries.md
    added: 2026-05-26

  - pattern: live_save_resource_mutation_from_snapshots
    status: active
    description: "Systems must not mutate live nested SaveData Resources through read snapshots."
    why: "Godot Resources are mutable; snapshot leaks bypass SaveTransaction and commit-before-emit rules."
    adr: docs/architecture/adr-0006-dragon-data-model-and-progression-services.md
    added: 2026-05-26

  - pattern: battle_commits_durable_state
    status: active
    description: "Battle Engine must not write save files, mutate DragonRecord, apply XP, add Scraps, mark map nodes, or write Singularity flags."
    why: "Battle owns combat runtime and raw settlement deltas; Campaign Map or Singularity owns durable settlement through Save / Persistence."
    adr: docs/architecture/adr-0007-battle-runtime-state-machine.md
    added: 2026-05-26

  - pattern: mutable_runtime_state_in_authored_resources
    status: active
    description: "Runtime combat/session state must not be stored in shared authored .tres Resources."
    why: "Authored Resources are shared content definitions; mutable battle state belongs in scene-local runtime objects."
    adr: docs/architecture/adr-0007-battle-runtime-state-machine.md
    added: 2026-05-26

  - pattern: hardcoded_battle_animation_branches
    status: active
    description: "Battle runtime and UI code must not branch on move names to choose sprite paths or VFX assets."
    why: "Move-specific animation coverage belongs in BattleAnimationManifest so every dragon, NPC, and boss action can be validated before content lock."
    adr: docs/architecture/adr-0007-battle-runtime-state-machine.md
    added: 2026-05-26

  - pattern: campaign_writes_singularity_state
    status: active
    description: "Campaign Map must not write Singularity-owned `scar_nodes[]`, `ending_id`, gatekeeper flags, or Mirror Admin flags."
    why: "Singularity owns corruption, boss milestone, Void grant, and ending settlement."
    adr: docs/architecture/adr-0008-campaign-map-content-and-reward-pipeline.md
    added: 2026-05-26

  - pattern: arbitrary_battle_scrap_authority
    status: active
    description: "Campaign Map settlement must not accept an arbitrary Battle-provided Scrap amount without validating it against authored encounter reward data."
    why: "Campaign Map/Singularity authored encounter data owns reward authority; Battle may echo but not invent final economy rewards."
    adr: docs/architecture/adr-0008-campaign-map-content-and-reward-pipeline.md
    added: 2026-05-26

  - pattern: direct_scrap_mutation
    status: active
    description: "Systems must not mutate `player_scraps` except through EconomyLedger inside a SaveTransaction."
    why: "Central validation prevents negative balances, partial purchases, and inconsistent reward/spend behavior."
    adr: docs/architecture/adr-0009-economy-and-shop-transaction-boundaries.md
    added: 2026-05-26

  - pattern: direct_expedition_flag_mutation
    status: active
    description: "Systems must not mutate expedition item flags except through source-specific ExpeditionInventoryLedger helpers."
    why: "Purchase, use, reset, and Battle settlement paths need auditable ownership."
    adr: docs/architecture/adr-0009-economy-and-shop-transaction-boundaries.md
    added: 2026-05-26

  - pattern: crown_relic_purchase
    status: active
    description: "Singularity Crown must not create, discount, sell, grant, reset, or consume relic ownership flags."
    why: "Shop is the sole normal relic purchase writer and relic flags represent prior commitment."
    adr: docs/architecture/adr-0009-economy-and-shop-transaction-boundaries.md
    added: 2026-05-26

  - pattern: campaign_or_battle_writes_singularity_flags
    status: active
    description: "Campaign Map and Battle Engine must not write corruption_class, scar_nodes[], gatekeeper flags, mirror_admin_defeated, void_dragon_granted, ending_id, or Mirror Admin phase checkpoints."
    why: "Singularity is the sole endgame progression authority; other systems provide traversal, runtime combat, or presentation inputs."
    adr: docs/architecture/adr-0010-singularity-boss-and-ending-orchestration.md
    added: 2026-05-26

  - pattern: gameplay_owned_rendering_mutation
    status: active
    description: "Gameplay systems must not directly mutate corruption rendering materials, compositor effects, or post-game overlays."
    why: "Rendering is presentation-only and must subscribe to committed semantic state without feeding authority back into gameplay."
    adr: docs/architecture/adr-0011-corruption-rendering-pipeline.md
    added: 2026-05-26

  - pattern: manual_corruption_viewport_chain
    status: active
    description: "MVP corruption screen effects must not use ad hoc manual viewport post-process chains."
    why: "Godot 4 uses Compositor/CompositorEffect for structured post-processing; manual chains complicate UI ordering, accessibility, and backend validation."
    adr: docs/architecture/adr-0011-corruption-rendering-pipeline.md
    added: 2026-05-26

  - pattern: global_rng_for_hatchery_pulls
    status: active
    description: "Hatchery pulls must not use global random calls or UI-owned RNG."
    why: "Pull outcomes, pity boundaries, and shiny tests must be deterministic and rollback-safe."
    adr: docs/architecture/adr-0012-hatchery-pull-transaction-and-rng-boundaries.md
    added: 2026-05-26

  - pattern: duplicated_fusion_preview_formula
    status: active
    description: "Fusion UI must not duplicate the fusion formula separately from FusionService."
    why: "Preview/commit drift misleads players and breaks acceptance tests."
    adr: docs/architecture/adr-0013-fusion-anvil-transaction-boundaries.md
    added: 2026-05-26

  - pattern: gameplay_writes_journal_state
    status: active
    description: "Gameplay systems must not directly mutate Journal unlock/read state."
    why: "Journal / Console owns lore delivery and read-state persistence."
    adr: docs/architecture/adr-0014-journal-console-and-lore-delivery-resources.md
    added: 2026-05-26

  - pattern: audio_blocks_gameplay
    status: active
    description: "Gameplay progression must not wait for audio playback or audio_event_finished."
    why: "Muted buses, missing cue assets, and platform audio failures must never block progression."
    adr: docs/architecture/adr-0015-audio-event-routing-and-mix-ownership.md
    added: 2026-05-26

